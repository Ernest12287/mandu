name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Single source of truth for "what kind of change is this PR?". Downstream
  # heavy jobs (db-integration / performance-budget / e2e) gate on these
  # outputs so a docs-only PR stays cheap, while a runtime/bundler PR still
  # auto-runs the relevant suites without needing a label.
  #
  # Pushes to main always run everything (changes job emits all=true) — main
  # is the safety net.
  changes:
    name: Detect change scope
    runs-on: ubuntu-latest
    outputs:
      db: ${{ steps.filter.outputs.db || steps.fallback.outputs.all }}
      perf: ${{ steps.filter.outputs.perf || steps.fallback.outputs.all }}
      e2e: ${{ steps.filter.outputs.e2e || steps.fallback.outputs.all }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Push fallback (run everything on main)
        id: fallback
        if: github.event_name != 'pull_request'
        run: echo "all=true" >> "$GITHUB_OUTPUT"

      - name: Path filters
        id: filter
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        with:
          filters: |
            db:
              - 'packages/core/src/db/**'
              - 'packages/core/tests/db/**'
              - 'packages/core/tests/fixtures/db/**'
              - '.github/workflows/ci.yml'
            perf:
              - 'packages/core/src/bundler/**'
              - 'packages/core/src/runtime/**'
              - 'packages/core/src/server/**'
              - 'packages/core/src/client/**'
              - 'scripts/perf/**'
              - '.github/workflows/ci.yml'
            e2e:
              - 'demo/todo-app/**'
              - 'demo/ai-chat/**'
              - 'packages/core/src/runtime/**'
              - 'packages/core/src/server/**'
              - 'packages/core/src/client/**'
              - 'packages/core/src/bundler/**'
              - 'packages/cli/src/commands/build.ts'
              - 'packages/cli/src/commands/start.ts'
              - 'packages/cli/src/commands/dev.ts'
              - '.github/workflows/ci.yml'

  # Linux: full test surface across Bun latest + pinned compatibility version.
  # All non-OS-sensitive suites run here only.
  quality-linux:
    name: Quality (ubuntu-latest, Bun ${{ matrix.bun }})
    strategy:
      fail-fast: false
      matrix:
        bun: [latest, 1.3.12]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ matrix.bun }}
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run test:core -- --randomize --retry=2 --seed=${{ github.run_id }}
      - run: bun run test:cli -- --randomize --retry=2 --seed=${{ github.run_id }}
      - run: bun run test:mcp -- --randomize --retry=2 --seed=${{ github.run_id }}
      - run: bun run test:ate -- --randomize --retry=2 --seed=${{ github.run_id }}
      - run: bun run test:edge -- --randomize --retry=2 --seed=${{ github.run_id }}
      - run: bun run test:skills -- --randomize --retry=2 --seed=${{ github.run_id }}
      - run: bun run test:playground-runner -- --randomize --retry=2 --seed=${{ github.run_id }}
      - run: bun run test:smoke

  # macOS/Windows: only core + cli — the suites where OS-specific regressions
  # actually surface (path handling, fs.watch, child_process, Bun.spawn).
  # mcp/ate/edge/skills/playground are pure-logic and covered on Linux.
  quality-os:
    name: Quality (${{ matrix.os }}, core+cli)
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run test:core -- --randomize --retry=2 --seed=${{ github.run_id }}
      - run: bun run test:cli -- --randomize --retry=2 --seed=${{ github.run_id }}

  db-integration:
    name: DB Integration (Postgres + MySQL)
    needs: changes
    if: |
      needs.changes.outputs.db == 'true' ||
      contains(github.event.pull_request.labels.*.name, 'ci:db')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile

      - name: Start Postgres + MySQL via compose
        run: |
          docker compose -f packages/core/tests/fixtures/db/docker-compose.yml up -d
          docker compose -f packages/core/tests/fixtures/db/docker-compose.yml ps

      - name: Wait for databases to report healthy
        run: |
          for i in $(seq 1 90); do
            status=$(docker compose -f packages/core/tests/fixtures/db/docker-compose.yml ps --format json | tr -d '\r' || true)
            pg_ok=$(echo "$status" | grep -c '"Service":"postgres".*"Health":"healthy"' || true)
            mysql_ok=$(echo "$status" | grep -c '"Service":"mysql".*"Health":"healthy"' || true)
            if [ "$pg_ok" = "1" ] && [ "$mysql_ok" = "1" ]; then
              echo "Both databases healthy after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Timed out waiting for databases to become healthy"
          docker compose -f packages/core/tests/fixtures/db/docker-compose.yml ps
          docker compose -f packages/core/tests/fixtures/db/docker-compose.yml logs --tail=100
          exit 1

      - name: DB integration tests (Postgres + MySQL)
        env:
          DB_TEST_POSTGRES_URL: postgres://test:test@localhost:5433/testdb
          DB_TEST_MYSQL_URL: mysql://test:test@localhost:3307/testdb
        run: bun test packages/core/tests/db/db-postgres.test.ts packages/core/tests/db/db-mysql.test.ts --retry=2

      - name: Collect compose logs on failure
        if: failure()
        run: |
          mkdir -p .db-integration-logs
          docker compose -f packages/core/tests/fixtures/db/docker-compose.yml logs postgres \
            > .db-integration-logs/postgres.log 2>&1 || true
          docker compose -f packages/core/tests/fixtures/db/docker-compose.yml logs mysql \
            > .db-integration-logs/mysql.log 2>&1 || true
          docker compose -f packages/core/tests/fixtures/db/docker-compose.yml ps \
            > .db-integration-logs/ps.txt 2>&1 || true

      - name: Upload compose logs
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: db-integration-logs
          path: .db-integration-logs/
          if-no-files-found: warn
          retention-days: 7

      - name: Tear down compose
        if: always()
        run: docker compose -f packages/core/tests/fixtures/db/docker-compose.yml down -v

  performance-budget:
    name: Performance Budget (ubuntu-latest, Bun latest)
    needs: changes
    if: |
      needs.changes.outputs.perf == 'true' ||
      contains(github.event.pull_request.labels.*.name, 'ci:perf')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run perf:baseline:check
      - run: bunx playwright install chromium
      - run: bun run perf:ci
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: perf-latest
          path: .perf/latest
          if-no-files-found: warn

  e2e:
    name: E2E (Playwright) — ${{ matrix.demo }}
    needs: changes
    if: |
      needs.changes.outputs.e2e == 'true' ||
      contains(github.event.pull_request.labels.*.name, 'ci:e2e')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        demo: [todo-app, ai-chat]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium
      - name: Build demo app
        working-directory: demo/${{ matrix.demo }}
        run: bun run build
      - name: Start demo server
        working-directory: demo/${{ matrix.demo }}
        run: bun run start &
      - name: Wait for server
        run: |
          for i in {1..60}; do
            if curl -sf http://localhost:3333 > /dev/null; then
              echo "Server ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Server failed to start within 60s"
          exit 1
      - name: Run E2E tests
        working-directory: demo/${{ matrix.demo }}
        env:
          CI: "true"
          BASE_URL: http://localhost:3333
        run: bun run test:e2e:ci
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report-${{ matrix.demo }}
          path: demo/${{ matrix.demo }}/.mandu/reports/
          retention-days: 7
          if-no-files-found: warn
