# MinIO fixture for `@mandujs/core/storage/s3` integration tests.
#
# Boots a single-node MinIO server on :9000 (S3 API) and :9001 (web console)
# with root credentials `minioadmin / minioadmin`, then provisions a
# `mandu-test` bucket via the `mc` client so integration tests can start
# uploading immediately.
#
# Run locally:
#   docker compose -f packages/core/tests/fixtures/s3/docker-compose.yml up -d
#   export AWS_ACCESS_KEY_ID=minioadmin
#   export AWS_SECRET_ACCESS_KEY=minioadmin
#   export MINIO_TEST_ENDPOINT=http://localhost:9000
#   bun test packages/core/tests/storage
#
# Tear down:
#   docker compose -f packages/core/tests/fixtures/s3/docker-compose.yml down -v

services:
  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: mandu-s3-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 2s
      timeout: 2s
      retries: 20

  # One-shot provisioner — creates the `mandu-test` bucket used by the test
  # suite. Exits 0 once the bucket exists; re-running is idempotent.
  createbucket:
    image: minio/mc:RELEASE.2025-02-21T16-00-46Z
    container_name: mandu-s3-createbucket
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/mandu-test;
      mc anonymous set download local/mandu-test;
      exit 0;
      "

volumes:
  minio-data:
